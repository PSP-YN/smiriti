<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5E3C"/>
      <stop offset="100%" style="stop-color:#5D3A1A"/>
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6D3"/>
      <stop offset="100%" style="stop-color:#E8D4C4"/>
    </linearGradient>
    <linearGradient id="glowGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>
  
  <!-- Decorative ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#A67B5B" stroke-width="2" opacity="0.5"/>
  
  <!-- Open book icon -->
  <g transform="translate(256, 256)">
    <!-- Left page -->
    <path d="M-80,-60 Q-40,-80 0,-60 L0,80 Q-40,100 -80,80 Z" 
          fill="url(#bookGradient)" stroke="#5D3A1A" stroke-width="3"/>
    
    <!-- Right page -->
    <path d="M80,-60 Q40,-80 0,-60 L0,80 Q40,100 80,80 Z" 
          fill="url(#bookGradient)" stroke="#5D3A1A" stroke-width="3"/>
    
    <!-- Book spine -->
    <path d="M0,-60 L0,80" stroke="#5D3A1A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Page lines left -->
    <g opacity="0.4">
      <line x1="-70" y1="-40" x2="-20" y2="-40" stroke="#5D3A1A" stroke-width="2"/>
      <line x1="-70" y1="-20" x2="-15" y2="-20" stroke="#5D3A1A" stroke-width="2"/>
      <line x1="-70" y1="0" x2="-20" y2="0" stroke="#5D3A1A" stroke-width="2"/>
      <line x1="-70" y1="20" x2="-15" y2="20" stroke="#5D3A1A" stroke-width="2"/>
      <line x1="-70" y1="40" x2="-20" y2="40" stroke="#5D3A1A" stroke-width="2"/>
    </g>
    
    <!-- Page lines right -->
    <g opacity="0.4">
      <line x1="20" y1="-40" x2="70" y2="-40" stroke="#5D3A1A" stroke-width="2"/>
      <line x1="15" y1="-20" x2="70" y2="-20" stroke="#5D3A1A" stroke-width="2"/>
      <line x1="20" y1="0" x2="70" y2="0" stroke="#5D3A1A" stroke-width="2"/>
      <line x1="15" y1="20" x2="70" y2="20" stroke="#5D3A1A" stroke-width="2"/>
      <line x1="20" y1="40" x2="70" y2="40" stroke="#5D3A1A" stroke-width="2"/>
    </g>
    
    <!-- AI/Brain symbol in center -->
    <circle cx="0" cy="-20" r="15" fill="url(#glowGradient)" filter="url(#glow)"/>
    <circle cx="0" cy="-20" r="8" fill="#FFD700"/>
    
    <!-- Neural connections -->
    <g stroke="#FFD700" stroke-width="1.5" opacity="0.7" filter="url(#glow)">
      <line x1="-12" y1="-28" x2="-25" y2="-40"/>
      <line x1="12" y1="-28" x2="25" y2="-40"/>
      <line x1="0" y1="-8" x2="0" y2="5"/>
    </g>
    
    <!-- Small nodes -->
    <circle cx="-25" cy="-40" r="3" fill="#FFD700"/>
    <circle cx="25" cy="-40" r="3" fill="#FFD700"/>
    <circle cx="0" cy="5" r="3" fill="#FFD700"/>
  </g>
  
  <!-- Text: Smriti -->
  <text x="256" y="380" 
        font-family="Georgia, serif" 
        font-size="48" 
        font-weight="bold" 
        fill="#F5E6D3" 
        text-anchor="middle"
        letter-spacing="4">SMRITI</text>
  
  <!-- Tagline -->
  <text x="256" y="410" 
        font-family="Georgia, serif" 
        font-size="14" 
        fill="#E8D4C4" 
        text-anchor="middle"
        opacity="0.8">Your Second Memory</text>
</svg>
