name: smriti
description: "Offline AI notebook — your second memory, on your phone."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter

  # UI and utilities
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.5
  path_provider: ^2.1.1
  path: ^1.9.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0

  # State management
  flutter_bloc: ^8.1.3
  get_it: ^7.6.4
  equatable: ^2.0.5

  # Document parsing
  google_mlkit_text_recognition: ^0.13.0

  # Vector database and ML
  objectbox: ^2.5.0
  objectbox_flutter_libs: ^2.5.0
  tflite_flutter: ^0.12.1

  # Security and storage
  crypto: ^3.0.3
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3
  uuid: ^4.3.3
  share_plus: ^10.0.0
  local_auth: ^2.3.0

  # Network and I/O
  ffi: ^2.1.0
  http: ^1.2.0
  connectivity_plus: ^5.0.0

  # Media
  image_picker: ^1.1.2
  image: ^4.1.3
  record: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  objectbox_generator: ^2.5.0

dependency_overrides:
  record_platform_interface: 1.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/
